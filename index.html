<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艾迪英打冒險 - 視覺優化版</title>
    <style>
        :root {
            --primary-blue: #0369A1;
            --light-blue: #7DD3FC;
            --bg-gradient: linear-gradient(180deg, #E0F2FE 0%, #F0F9FF 100%);
        }

        body {
            margin: 0; background: var(--bg-gradient);
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh;
        }

        #stats { width: 950px; display: flex; justify-content: space-around; padding: 15px; font-size: 22px; font-weight: bold; color: var(--primary-blue); }
        #main-layout { display: flex; gap: 15px; align-items: flex-start; }

        #game-container {
            position: relative; width: 780px; height: 550px;
            background: rgba(255, 255, 255, 0.9); border: 6px solid var(--light-blue);
            border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden;
        }

        /* --- 飄浮 Combo (1-9) --- */
        .floating-combo {
            position: absolute; font-weight: 900; font-size: 40px; color: #38BDF8;
            text-shadow: 2px 2px 0px white; pointer-events: none; z-index: 5;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        /* --- 固定 Combo (10+) --- */
        #mega-combo-display {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            font-weight: 900; font-size: 100px; color: #FFFFFF;
            text-shadow: 0 0 15px #FBBF24; opacity: 0.4; /* 透明化 */
            pointer-events: none; z-index: 1; /* 層級調低，避免擋字 */
            display: none; animation: subtleShake 0.2s infinite linear;
        }
        @keyframes subtleShake {
            0% { transform: translate(-51%, -51%) rotate(-1deg); }
            50% { transform: translate(-49%, -49%) rotate(1deg); }
            100% { transform: translate(-51%, -51%) rotate(-1deg); }
        }

        /* --- Praise 搖擺優化 --- */
        #praise-container {
            position: absolute; top: 10px; right: 10px; 
            width: 220px; height: 220px;
            background-image: url('praise.png'); background-size: contain; background-repeat: no-repeat;
            display: none; z-index: 50; pointer-events: none;
        }
        .pop-praise { display: block !important; animation: praiseSwing 0.8s ease-out forwards; }
        @keyframes praiseSwing {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            30% { transform: scale(1.2) rotate(20deg); opacity: 1; }
            60% { transform: scale(1.1) rotate(-20deg); opacity: 1; }
            100% { transform: scale(1) rotate(0); opacity: 0; }
        }

        /* 排行榜與單字樣式保持不變 */
        #leaderboard-side { width: 160px; background: rgba(255, 251, 235, 0.8); border: 2px solid #F59E0B; border-radius: 15px; padding: 10px; height: 530px; font-size: 14px; }
        .rank-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #FEF3C7; color: #92400E; }
        .word { position: absolute; font-size: 24px; font-weight: 700; color: #1E293B; background: white; padding: 8px 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 2px solid var(--light-blue); display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .word span.translation { font-size: 15px; color: #64748B; }
        #input-area { margin-top: 20px; }
        #input-field { font-size: 32px; padding: 10px 30px; border: 4px solid #38BDF8; border-radius: 40px; outline: none; width: 450px; text-align: center; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        button { padding: 12px 40px; font-size: 22px; background: #0EA5E9; color: white; border: none; border-radius: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="stats">
        <div>⭐ 分數: <span id="score">0</span></div>
        <div>🔥 連擊: <span id="combo-count">0</span></div>
        <div>📖 階段: <span id="stage">入門</span></div>
    </div>

    <div id="main-layout">
        <div id="game-container">
            <div id="mega-combo-display"></div>
            <div id="praise-container"></div>
            <div id="overlay">
                <h1 style="color: var(--primary-blue);">艾迪英打冒險</h1>
                <button onclick="startGame()">開始冒險！</button>
            </div>
        </div>
        <div id="leaderboard-side">
            <h3 style="text-align:center; color:#B45309; margin:5px;">🏆 排行榜</h3>
            <div id="rank-list"></div>
        </div>
    </div>

    <div id="input-area">
        <input type="text" id="input-field" placeholder="看著英文輸入..." autocomplete="off" disabled>
    </div>

    <script>
        const wordData = {
            short: [{en: "area", cn: "區域"}, {en: "base", cn: "基礎"}, {en: "cell", cn: "細胞"}, {en: "data", cn: "數據"}, {en: "fact", cn: "事實"}],
            med: [{en: "adapt", cn: "適應"}, {en: "basic", cn: "基礎"}, {en: "cause", cn: "成因"}, {en: "cycle", cn: "循環"}],
            long: [{en: "analyze", cn: "分析"}, {en: "benefit", cn: "利益"}, {en: "complex", cn: "複雜的"}],
            expert: [{en: "accuracy", cn: "準確性"}, {en: "boundary", cn: "邊界"}, {en: "category", cn: "類別"}]
        };

        let score = 0, combo = 0, gameActive = false, activeWords = [], currentSpeed = 0.6;
        let spawnTimer, gameLoop;
        let highScores = JSON.parse(localStorage.getItem('typingScoresFinal')) || [{name: "艾迪", score: 100}];

        const gameContainer = document.getElementById('game-container');
        const megaComboDisplay = document.getElementById('mega-combo-display');
        const inputField = document.getElementById('input-field');

        window.onload = updateLeaderboardUI;

        function updateLeaderboardUI() {
            document.getElementById('rank-list').innerHTML = highScores.slice(0, 10).map((item, i) => `
                <div class="rank-item"><span>${i+1}. ${item.name}</span><span>${item.score}</span></div>
            `).join('');
        }

        function startGame() {
            score = 0; combo = 0; currentSpeed = 0.6; activeWords = []; gameActive = true;
            document.getElementById('overlay').style.display = 'none';
            megaComboDisplay.style.display = 'none';
            inputField.disabled = false; inputField.value = ''; inputField.focus();
            document.querySelectorAll('.word').forEach(w => w.remove());
            updateStats(); scheduleNextSpawn();
            gameLoop = requestAnimationFrame(updateFrame);
        }

        function scheduleNextSpawn() {
            if (!gameActive) return;
            spawnTimer = setTimeout(() => { spawnWord(); scheduleNextSpawn(); }, 2500 - Math.min(1300, score * 2));
        }

        function spawnWord() {
            let pool = score < 60 ? wordData.short : (score < 150 ? wordData.med : (score < 300 ? wordData.long : wordData.expert));
            let wordObj = pool[Math.floor(Math.random() * pool.length)];
            const div = document.createElement('div');
            div.className = 'word';
            div.innerHTML = `${wordObj.en}<span class="translation">${wordObj.cn}</span>`;
            div.style.left = Math.random() * (gameContainer.offsetWidth - 180) + 'px';
            div.style.top = '-60px';
            gameContainer.appendChild(div);
            activeWords.push({ el: div, text: wordObj.en, y: -60 });
        }

        function updateFrame() {
            if (!gameActive) return;
            for (let i = activeWords.length - 1; i >= 0; i--) {
                let w = activeWords[i];
                w.y += currentSpeed; w.el.style.top = w.y + 'px';
                if (w.y > 550 - 50) { gameOver(); return; }
            }
            gameLoop = requestAnimationFrame(updateFrame);
        }

        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = inputField.value.toLowerCase().trim();
                const index = activeWords.findIndex(w => w.text.toLowerCase() === val);
                
                if (index !== -1) {
                    const matchedWord = activeWords[index];
                    const posX = matchedWord.el.offsetLeft;
                    const posY = matchedWord.el.offsetTop;

                    matchedWord.el.remove();
                    activeWords.splice(index, 1);
                    combo++;
                    score += (combo >= 10 ? 20 : 10);
                    
                    createFloatingCombo(posX, posY); // 在字消失的地方產生 Combo
                    showMegaComboEffect();
                    showPraiseEffect();
                    if (score % 100 === 0) currentSpeed += 0.08;
                } else {
                    combo = 0;
                    megaComboDisplay.style.display = 'none';
                }
                inputField.value = '';
                updateStats();
            }
        });

        // 建立在單字位置飄浮的 Combo
        function createFloatingCombo(x, y) {
            if (combo < 2 || combo >= 10) return;
            const floatDiv = document.createElement('div');
            floatDiv.className = 'floating-combo';
            floatDiv.innerText = `x${combo}`;
            floatDiv.style.left = x + 'px';
            floatDiv.style.top = y + 'px';
            gameContainer.appendChild(floatDiv);
            
            // 動畫結束後自動刪除
            setTimeout(() => floatDiv.remove(), 800);
        }

        function showMegaComboEffect() {
            if (combo < 10) return;
            megaComboDisplay.innerText = `x${combo}`;
            megaComboDisplay.style.display = 'block';
        }

        function showPraiseEffect() {
            const praise = document.getElementById('praise-container');
            praise.classList.remove('pop-praise');
            void praise.offsetWidth;
            praise.classList.add('pop-praise');
        }

        function updateStats() {
            document.getElementById('score').innerText = score;
            document.getElementById('combo-count').innerText = combo;
            document.getElementById('stage').innerText = score < 100 ? "入門" : (score < 300 ? "高手" : "大師");
        }

        function gameOver() {
            gameActive = false; clearTimeout(spawnTimer); cancelAnimationFrame(gameLoop);
            inputField.disabled = true;
            megaComboDisplay.style.display = 'none';
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlay').innerHTML = `<h2>遊戲結束</h2><p>最終得分: ${score}</p><button onclick="location.reload()">再玩一次</button>`;
        }
    </script>
</body>
</html>
