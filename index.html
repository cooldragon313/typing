        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        #top-info { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 2px solid #1E293B; background: rgba(15,23,42,0.9); z-index: 10; }
        .stat-box { font-weight: bold; font-size: 16px; }
        #champ-box { color: var(--gold); border: 1px solid var(--gold); padding: 5px 12px; border-radius: 20px; font-size: 13px; }

        #battlefield { position: relative; width: 100%; height: 55vh; background: #0F172A; overflow: hidden; flex-shrink: 0; border-bottom: 2px solid #334155; }
        #base-wall { position: absolute; right: 0; top: 0; bottom: 0; width: 45px; background: #334155; border-left: 4px solid #94A3B8; z-index: 5; }

        /* 敵軍飛彈 */
        .enemy { 
            position: absolute; background: white; color: #0F172A; padding: 6px 15px; border-radius: 5px 20px 20px 5px; 
            font-weight: 900; font-size: 20px; white-space: nowrap; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: -5px 0 15px rgba(244, 63, 94, 0.4);
        }
        .enemy span { font-size: 12px; color: #64748B; font-weight: normal; margin-top: 2px; }

        /* 原地爆炸 Combo 文字 */
        .pop-txt { position: absolute; color: var(--accent); font-weight: bold; font-size: 24px; z-index: 50; pointer-events: none; text-shadow: 2px 2px 0 white; animation: burst 0.6s ease-out forwards; }
        @keyframes burst { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5) translateY(-50px); opacity: 0; } }

        /* 螢幕巨大脈動 Combo (10+) */
        #big-combo { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; font-weight: 900; color: rgba(251, 191, 36, 0.15); pointer-events: none; display: none; z-index: 1; text-align: center; font-style: italic; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } }

        /* 照片左右晃動 */
        #praise-img { position: absolute; bottom: 20px; right: 60px; width: 120px; height: 120px; background-size: contain; background-repeat: no-repeat; z-index: 100; display: none; pointer-events: none; }
        .shake-anim { display: block !important; animation: shake-praise 0.9s ease-in-out forwards; }
        @keyframes shake-praise { 
            0% { transform: scale(0) rotate(0); opacity: 0; }
            20% { transform: scale(1.2) rotate(-15deg); opacity: 1; }
            40% { transform: rotate(15deg); }
            60% { transform: rotate(-10deg); }
            80% { transform: rotate(5deg); }
            100% { transform: scale(1) rotate(0); opacity: 0; }
        }

        #input-area { flex-grow: 1; background: #1E293B; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #input-field { width: 95%; max-width: 450px; font-size: 28px; padding: 12px; border: 4px solid var(--primary); border-radius: 12px; text-align: center; background: #0F172A; color: white; outline: none; transition: 0.2s; }
        .error-flash { border-color: var(--accent) !important; background: #451212 !important; animation: shake-input 0.2s; }
        @keyframes shake-input { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        #overlay, #modal { position: absolute; inset: 0; background: rgba(15,23,42,0.95); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        #modal { display: none; }
        .btn { padding: 16px 50px; font-size: 22px; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px; box-shadow: 0 4px 0 #0369A1; }
    </style>
</head>
<body>

    <div id="top-info">
        <div class="stat-box">⭐ 分數: <span id="ui-score">0</span></div>
        <div id="champ-box">🏆 榜主: <span id="top-name">無</span> - <span id="top-score">0</span></div>
        <div class="stat-box">🔥 連擊: <span id="ui-combo">0</span></div>
    </div>

    <div id="battlefield">
        <div id="big-combo">0 COMBO</div>
        <div id="base-wall"></div>
        <div id="praise-img"></div>
        
        <div id="overlay">
            <h1 style="color:var(--gold); font-size: 40px; margin-bottom:10px;">基地攻防戰</h1>
            <p>輸入飛彈上的單字按 Enter 攔截</p>
            <p style="font-size: 14px; color: #94A3B8; margin-top: 10px;">按下 [Enter] 或點擊按鈕開始</p>
            <button class="btn" onclick="startGame()">建立防線</button>
        </div>
    </div>

    <div id="input-area">
        <input type="text" id="input-field" placeholder="點擊開始遊戲..." disabled autocomplete="off" spellcheck="false">
        <p id="ui-level" style="margin-top:15px; color:var(--primary); font-weight:bold; font-size: 18px;">等級：初級攔截</p>
    </div>

    <div id="modal">
        <h2 id="modal-title" style="color:var(--gold); font-size: 30px;">基地失守！</h2>
        <p id="final-stats" style="margin:15px 0; font-size: 20px;"></p>
        <div id="new-record-input" style="display:none; width:100%;">
            <p style="color:var(--accent); margin-bottom:10px; font-weight: bold;">恭喜打破紀錄！請留下大名：</p>
            <input type="text" id="player-name" placeholder="輸入戰士代號" maxlength="10" style="padding:12px; border-radius:8px; text-align:center; width: 80%; font-size: 18px;">
        </div>
        <button class="btn" onclick="submitAndRestart()">儲存紀錄並重開</button>
    </div>

    <script>
        let score = 0, combo = 0, gameActive = false, enemies = [], speed = 1.0, currentLevelLabel = "";
        let audioCtx = null;

        function loadChamp() {
            const data = JSON.parse(localStorage.getItem('base_defense_v3_records') || '[]');
            if(data.length > 0) {
                document.getElementById('top-name').innerText = data[0].name;
                document.getElementById('top-score').innerText = data[0].score;
            }
        }
        loadChamp();

        if(CONFIG.praise_image.length > 10) document.getElementById('praise-img').style.backgroundImage = `url(${CONFIG.praise_image})`;

        // 按 Enter 開始遊戲
        window.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && !gameActive && document.getElementById('overlay').style.display !== 'none') {
                startGame();
            }
        });

        function playSfx(freq, dur, type='sine') {
            try {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = type; osc.connect(g); g.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
                osc.start(); osc.stop(audioCtx.currentTime + dur);
            } catch(e){}
        }

        function speak(txt) {
            if(!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(txt);
            m.lang = CONFIG.voice_lang; m.rate = CONFIG.voice_rate;
            window.speechSynthesis.speak(m);
        }

        function startGame() {
            score = 0; combo = 0; enemies = []; gameActive = true;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('modal').style.display = 'none';
            const input = document.getElementById('input-field');
            input.disabled = false; input.value = '';
            setTimeout(() => input.focus(), 200);
            updateUI();
            updateDifficulty();
            spawnLoop();
            requestAnimationFrame(gameLoop);
        }

        function updateDifficulty() {
            let level = CONFIG.levels[0];
            for (let l of CONFIG.levels) {
                if (score >= l.score) level = l;
            }
            speed = level.speed;
            currentLevelLabel = level.label;
            document.getElementById('ui-level').innerText = `等級：${currentLevelLabel}`;
        }

        function spawnLoop() {
            if(!gameActive) return;
            
            // 分級字庫邏輯
            let pool = CONFIG.word_library;
            if (score < 300) {
                pool = CONFIG.word_library.filter(w => w.en.length <= 4);
            }

            const w = pool[Math.floor(Math.random() * pool.length)];
            const el = document.createElement('div');
            el.className = 'enemy';
            el.innerHTML = `${w.en}<span>${w.cn}</span>`;
            el.style.left = '-150px';
            el.style.top = (Math.random() * (document.getElementById('battlefield').offsetHeight - 80) + 20) + 'px';
            document.getElementById('battlefield').appendChild(el);
            enemies.push({ el, text: w.en.toLowerCase(), x: -150 });
            
            let wait = Math.max(800, 2600 - (score * 0.9));
            setTimeout(spawnLoop, wait);
        }

        function gameLoop() {
            if(!gameActive) return;
            const wall = document.getElementById('battlefield').offsetWidth - 45;
            for(let i = enemies.length-1; i>=0; i--) {
                let e = enemies[i];
                e.x += speed;
                e.el.style.transform = `translateX(${e.x}px)`;
                if(e.x > wall - 50) { endGame(); return; }
            }
            requestAnimationFrame(gameLoop);
        }

        document.getElementById('input-field').addEventListener('keydown', (e) => {
            if(e.key === 'Enter') {
                const val = e.target.value.toLowerCase().trim();
                const idx = enemies.findIndex(en => en.text === val);

                if(idx !== -1 && val !== "") {
                    // 答對邏輯
                    const target = enemies[idx];
                    createPop(target.el.offsetLeft + 20, target.el.offsetTop, `+${combo+1} Combo`);
                    target.el.remove();
                    enemies.splice(idx, 1);
                    combo++;
                    score += (10 + Math.floor(combo/1.2));
                    playSfx(880, 0.12);
                    if(combo % 5 === 0) speak(CONFIG.praises[Math.floor(Math.random()*CONFIG.praises.length)]);
                    showPraise();
                    updateDifficulty();
                } else {
                    // 答錯邏輯 (Strict Mode)
                    if (combo > 0) playSfx(150, 0.3, 'sawtooth');
                    combo = 0;
                    flashError();
                }
                e.target.value = '';
                updateUI();
            }
        });

        function createPop(x, y, txt) {
            if (combo >= 10) return; // 10連擊後改由大字顯示
            const p = document.createElement('div');
            p.className = 'pop-txt'; p.style.left = x+'px'; p.style.top = y+'px';
            p.innerText = txt;
            document.getElementById('battlefield').appendChild(p);
            setTimeout(() => p.remove(), 600);
        }

        function showPraise() {
            const p = document.getElementById('praise-img');
            p.classList.remove('shake-anim'); void p.offsetWidth; p.classList.add('shake-anim');
        }

        function flashError() {
            const f = document.getElementById('input-field');
            f.classList.add('error-flash');
            setTimeout(() => f.classList.remove('error-flash'), 250);
        }

        function updateUI() {
            document.getElementById('ui-score').innerText = score;
            document.getElementById('ui-combo').innerText = combo;
            const big = document.getElementById('big-combo');
            if(combo >= 10) {
                big.innerText = `${combo} COMBO`;
                big.style.display = 'block';
            } else {
                big.style.display = 'none';
            }
        }

        function endGame() {
            gameActive = false;
            playSfx(80, 0.8, 'square');
            document.getElementById('input-field').disabled = true;
            document.getElementById('final-stats').innerText = `防禦崩潰！最終得分: ${score} | 最大連擊: ${combo}`;
            
            const records = JSON.parse(localStorage.getItem('base_defense_v3_records') || '[]');
            const isTop = records.length < 5 || score > records[records.length-1].score;
            
            if(isTop) {
                document.getElementById('new-record-input').style.display = 'block';
                document.getElementById('modal-title').innerText = "🎉 英雄誕生！";
            } else {
                document.getElementById('new-record-input').style.display = 'none';
                document.getElementById('modal-title').innerText = "基地失守";
            }
            document.getElementById('modal').style.display = 'flex';
        }

        function submitAndRestart() {
            if(document.getElementById('new-record-input').style.display === 'block') {
                const name = document.getElementById('player-name').value.trim() || "無名戰士";
                let records = JSON.parse(localStorage.getItem('base_defense_v3_records') || '[]');
                records.push({ name, score });
                records.sort((a,b) => b.score - a.score);
                localStorage.setItem('base_defense_v3_records', JSON.stringify(records.slice(0, 10)));
            }
            location.reload();
        }
    </script>
</body>
</html>
